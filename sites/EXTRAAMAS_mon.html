	<!-- js -->

		});

	<!-- Load the menu items from the JSON file-->
	<script src="./js/menuDataLoader.js"></script>

	<!-- Load the program from the JSON file-->
	<script>
		fetch('./data/program.json')
			.then(response => response.json())
			.then(data => {
				var scheduleDiv = document.getElementById("program");

				// Info block
				scheduleDiv.innerHTML = `
					<div class="program-info">
						<span><i class="fas fa-map-marker-alt"></i> <strong>Room:</strong> <span class="room">${data.event.room}</span></span>
						<span class="info-sep">|</span>
						<a href="${data.event.weblink}" target="_blank" class="weblink"><i class="fas fa-external-link-alt"></i> Web Link</a>
						<span class="info-sep no-print">|</span>
						<a href="#" class="download-link no-print" onclick="window.print(); return false;"><i class="fas fa-file-pdf"></i> Download the Program</a>
					</div>
				`;

				let currentSession = null;
				let currentPapersDiv = null;

				function closeSession() {
					if (currentSession) {
						scheduleDiv.appendChild(currentSession);
						currentSession = null;
						currentPapersDiv = null;
					}
				}

				data.event.schedule.forEach(item => {

					if (item.type === 'session') {
						closeSession();
						currentSession = document.createElement('div');
						currentSession.className = 'session-block';
						const sessionNumHtml = item.number
							? `<span class="session-number">Session ${item.number}</span>`
							: '';
						const chairHtml = item.chair
							? `<div class="session-chair"><i class="fas fa-user-tie"></i> Chair: ${item.chair}</div>`
							: '';
						currentSession.innerHTML = `
							<div class="session-header">
								${sessionNumHtml}
								<span class="session-title">${item.title}</span>
								<span class="session-time"><i class="fas fa-clock"></i> ${item.time}</span>
								${chairHtml}
							</div>
						`;
						currentPapersDiv = document.createElement('div');
						currentPapersDiv.className = 'session-papers';
						currentSession.appendChild(currentPapersDiv);

					} else if (item.type === 'break') {
						closeSession();
						const isLunch = /lunch/i.test(item.label);
						const icon = isLunch ? 'fa-utensils' : 'fa-mug-hot';
						const cls = isLunch ? 'lunch' : 'coffee';
						const el = document.createElement('div');
						el.className = `break-banner ${cls}`;
						el.innerHTML = `<i class="fas ${icon}"></i> ${item.label} <span class="break-time">${item.time}</span>`;
						scheduleDiv.appendChild(el);

					} else if (item.type === 'keynote') {
						if (!currentPapersDiv) return;
						const row = document.createElement('div');
						row.className = 'paper-row keynote-row';
						row.innerHTML = `
							<span class="paper-time">${item.time}</span>
							<div class="paper-content">
								<div class="paper-title"><span class="paper-badge keynote">Keynote</span>${item.title || 'TBC'}</div>
								${item.speaker ? `<div class="paper-authors"><i class="fas fa-microphone"></i> ${item.speaker}</div>` : ''}
							</div>
						`;
						currentPapersDiv.appendChild(row);

					} else if (item.type === 'paper') {
						if (!currentPapersDiv) return;
						const kindLabels = { full: 'Full Paper', short: 'Short Paper', demo: 'Demo' };
						const badge = item.kind && kindLabels[item.kind]
							? `<span class="paper-badge ${item.kind}">${kindLabels[item.kind]}</span>`
							: '';
						const row = document.createElement('div');
						row.className = 'paper-row';
						row.innerHTML = `
							<span class="paper-time">${item.time}</span>
							<div class="paper-content">
								<div class="paper-title">${badge}${item.title}</div>
								${item.authors ? `<div class="paper-authors">${item.authors}</div>` : ''}
							</div>
						`;
						currentPapersDiv.appendChild(row);
					}
				});

				closeSession(); // close any remaining open session
			})
			.catch(err => console.error('program.json load error:', err));

		// Populate PDF header chairs
		fetch('./data/organization.json')
			.then(r => r.json())
			.then(orgData => {
				const group = orgData.organization.find(g => g.title === 'Program Chairs');
				if (!group) return;
				const el = document.getElementById('pdf-chairs');
				if (!el) return;
				el.innerHTML = `
					<p class="pdf-chairs-title">Program Chairs</p>
					${group.people.map(p => `<p class="pdf-chair-name">${p.name}</p>`).join('')}
				`;
			})
			.catch(err => console.error('organization.json load error:', err));

		document.addEventListener('DOMContentLoaded', () => {
			const yearEl = document.getElementById('year');
			if (yearEl) yearEl.textContent = new Date().getFullYear();
		});
	</script>
