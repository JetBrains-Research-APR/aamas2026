<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AAMAS 2026 — Schedule</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row title-row">
      <h1>AAMAS 2026</h1>
      <div class="counts">
        <span id="starCount">0</span> starred ·
        <span id="visibleCount">0</span> shown
      </div>
      <div id="authArea" class="auth-area"></div>
    </div>
    <div class="topbar-row">
      <nav class="day-tabs" id="dayTabs" aria-label="Conference days"></nav>
    </div>
    <div class="topbar-row controls">
      <input id="searchBox" type="search" placeholder="Search title, author, track, chair…" autocomplete="off">
      <span class="filter-group" role="radiogroup" aria-label="Star filter">
        <span class="filter-group-label">★ Show:</span>
        <label class="toggle filter-radio">
          <input type="radio" name="starredFilter" value="all">
          <span>all</span>
        </label>
        <label class="toggle filter-radio">
          <input type="radio" name="starredFilter" value="me">
          <span>mine</span>
        </label>
        <label class="toggle filter-radio requires-auth">
          <input type="radio" name="starredFilter" value="anyone">
          <span>anyone's</span>
        </label>
      </span>
      <label class="toggle">
        <input type="checkbox" id="hideBoring">
        <span>👎 Hide boring</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="hidePast">
        <span>Hide past</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="nextWindow">
        <span>Next 2 hours</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="timetable">
        <span>Parallel sessions</span>
      </label>
      <button id="downloadBtn" class="auth-btn" title="Download your starred and boring markings as CSV">&#8595; Download markings</button>
    </div>
  </header>

  <main id="program" class="program"></main>

  <div id="loadingMsg" class="loading">Loading schedule…</div>
  <div id="errorMsg" class="error" hidden></div>

  <footer class="footer">
    Data compiled from
    <a href="https://cyprusconferences.org/aamas2026/detailed-program/" target="_blank" rel="noopener">the official AAMAS 2026 program</a>
    and 35 workshop/tutorial sites. Stars are saved in this browser only.
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
